<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexa | Professional Communication</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='30' fill='%2318181b'/><path d='M50 25 L75 40 L75 65 L50 80 L25 65 L25 40 Z' fill='%23e4e4e7' stroke='%2318181b' stroke-width='2'/></svg>">
    
    <style>
        /* 
         * NEXA DESIGN SYSTEM v3.0
         * Premium Monochrome / Glassmorphism / High Performance
         */

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400&display=swap');

        :root {
            /* Palette: Zinc/Monochrome */
            --bg-dark: #09090b;       /* Zinc 950 */
            --bg-panel: #18181b;      /* Zinc 900 */
            --bg-surface: #27272a;    /* Zinc 800 */
            --bg-hover: #3f3f46;      /* Zinc 700 */
            
            --text-main: #f4f4f5;     /* Zinc 100 */
            --text-muted: #a1a1aa;    /* Zinc 400 */
            
            --accent: #ffffff;
            --accent-dim: rgba(255,255,255,0.1);
            
            --glass-bg: rgba(24, 24, 27, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            
            --status-online: #22c55e;
            --status-idle: #eab308;
            --status-dnd: #ef4444;
            --status-offline: #71717a;

            --font-ui: 'Inter', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
            
            --ease-elastic: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-ui);
            height: 100vh;
            overflow: hidden;
            font-feature-settings: "cv02", "cv03", "cv04", "cv11";
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-surface); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--bg-hover); }

        /* --- UTILS & ANIMATIONS --- */
        .hidden { display: none !important; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .fade-in { animation: fadeIn 0.4s var(--ease-smooth) forwards; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* --- AUTH & LANDING --- */
        #landing-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; background: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-image: radial-gradient(circle at 50% 50%, #27272a 0%, #09090b 70%);
        }

        .hero-card {
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 60px; border-radius: 24px;
            text-align: center; max-width: 500px; width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: popIn 0.6s var(--ease-elastic);
        }

        .brand-title {
            font-size: 3.5rem; font-weight: 800; letter-spacing: -0.05em;
            background: linear-gradient(to bottom, #fff, #71717a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .btn-3d {
            background: var(--text-main); color: var(--bg-dark);
            border: none; padding: 14px 28px; border-radius: 12px;
            font-weight: 600; font-size: 1rem; cursor: pointer;
            box-shadow: 0 4px 0 #a1a1aa, 0 10px 20px rgba(0,0,0,0.3);
            transition: all 0.1s; width: 100%; margin-top: 20px;
        }
        .btn-3d:active { transform: translateY(4px); box-shadow: 0 0 0 #a1a1aa, inset 0 2px 5px rgba(0,0,0,0.2); }
        
        .input-nexa {
            width: 100%; background: var(--bg-dark); border: 1px solid var(--bg-surface);
            padding: 14px; border-radius: 8px; color: white; margin-bottom: 15px;
            transition: 0.2s; font-family: var(--font-ui);
        }
        .input-nexa:focus { border-color: var(--text-muted); box-shadow: 0 0 0 2px rgba(255,255,255,0.05); }

        /* --- MAIN APP GRID --- */
        #app-view {
            display: grid; 
            grid-template-columns: 72px 260px 1fr 240px; 
            height: 100vh; width: 100vw;
        }

        /* 1. Server Rail */
        .rail-servers {
            background: var(--bg-dark); display: flex; flex-direction: column; align-items: center;
            padding: 12px 0; gap: 8px; border-right: 1px solid var(--glass-border);
        }

        .server-pill {
            width: 48px; height: 48px; border-radius: 50%; background: var(--bg-panel);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s var(--ease-elastic); position: relative;
            color: var(--text-main); font-weight: 600; font-size: 0.9rem;
        }
        .server-pill:hover, .server-pill.active {
            border-radius: 16px; background: var(--text-main); color: var(--bg-dark);
        }
        .server-pill.active::before {
            content: ''; position: absolute; left: -14px; width: 8px; height: 40px;
            background: white; border-radius: 0 4px 4px 0;
        }
        .nav-sep { width: 32px; height: 2px; background: var(--bg-surface); margin: 4px 0; border-radius: 1px; }

        /* 2. Sidebar Channels */
        .sidebar-channels {
            background: var(--bg-panel); display: flex; flex-direction: column;
            border-right: 1px solid var(--glass-border);
        }
        
        .header-server {
            height: 56px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between;
            font-weight: 700; border-bottom: 1px solid var(--glass-border); cursor: pointer;
            transition: 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .header-server:hover { background: var(--bg-surface); }

        .channels-list { flex: 1; overflow-y: auto; padding: 16px 8px; }
        
        .cat-name {
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted);
            margin: 16px 8px 4px 8px; display: flex; align-items: center; cursor: pointer;
        }
        .channel-item {
            padding: 6px 8px; margin: 2px 0; border-radius: 4px; color: var(--text-muted);
            cursor: pointer; display: flex; align-items: center; font-weight: 500;
        }
        .channel-item:hover { background: var(--bg-surface); color: var(--text-main); }
        .channel-item.active { background: rgba(255,255,255,0.1); color: white; }
        .ch-icon { margin-right: 6px; opacity: 0.6; font-size: 1.1rem; }

        .user-area {
            height: 64px; background: rgba(0,0,0,0.2); padding: 0 12px;
            display: flex; align-items: center; gap: 12px; border-top: 1px solid var(--glass-border);
        }
        .avatar-wrapper { position: relative; cursor: pointer; }
        .avatar-img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: var(--bg-surface); }
        .status-dot {
            position: absolute; bottom: -2px; right: -2px; width: 12px; height: 12px;
            border-radius: 50%; border: 2px solid var(--bg-panel);
        }

        /* 3. Chat Area */
        .chat-main {
            background: var(--bg-dark); display: flex; flex-direction: column; position: relative;
        }
        
        .top-bar {
            height: 56px; padding: 0 24px; display: flex; align-items: center;
            border-bottom: 1px solid var(--glass-border); box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .hashtag { color: var(--text-muted); font-size: 1.5rem; margin-right: 12px; }
        .chat-title { font-weight: 700; color: white; margin-right: 16px; }
        .chat-desc { color: var(--text-muted); font-size: 0.85rem; border-left: 1px solid var(--bg-surface); padding-left: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}

        .messages-container {
            flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column;
        }

        .message-row {
            display: flex; margin-top: 16px; padding: 2px 0; group;
        }
        .msg-avatar { width: 40px; height: 40px; border-radius: 50%; margin-right: 16px; cursor: pointer; }
        .msg-body { flex: 1; min-width: 0; }
        .msg-header { display: flex; align-items: baseline; margin-bottom: 4px; }
        .msg-author { font-weight: 600; color: white; margin-right: 8px; cursor: pointer; }
        .msg-author:hover { text-decoration: underline; }
        .msg-date { font-size: 0.7rem; color: var(--text-muted); }
        .msg-text { color: #dcddde; line-height: 1.45; font-size: 0.95rem; word-break: break-word; white-space: pre-wrap; }

        .input-area { padding: 0 24px 24px 24px; }
        .input-wrapper {
            background: var(--bg-surface); border-radius: 8px; padding: 12px 16px;
            display: flex; align-items: center;
        }
        .chat-input {
            flex: 1; background: transparent; border: none; color: white; font-size: 1rem;
        }

        /* 4. Members List */
        .members-sidebar {
            background: var(--bg-panel); border-left: 1px solid var(--glass-border);
            padding: 24px 16px; overflow-y: auto;
        }
        .role-title {
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            color: var(--text-muted); margin-bottom: 12px;
        }
        .member-item {
            display: flex; align-items: center; padding: 6px 8px; border-radius: 4px;
            cursor: pointer; opacity: 0.9; margin-bottom: 2px;
        }
        .member-item:hover { background: var(--bg-surface); opacity: 1; }
        .member-info { margin-left: 12px; }
        .member-name { font-weight: 500; color: var(--text-main); font-size: 0.9rem; }
        .member-status { font-size: 0.7rem; color: var(--text-muted); }

        /* Modals */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 1000; display: none; align-items: center; justify-content: center;
        }
        .modal-box {
            background: var(--bg-panel); width: 440px; border-radius: 12px; padding: 24px;
            border: 1px solid var(--glass-border); box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: popIn 0.2s var(--ease-elastic);
        }

        /* Responsive */
        @media (max-width: 1000px) { #app-view { grid-template-columns: 72px 0 1fr 0; } .members-sidebar { display: none; } }
    </style>
</head>
<body>

    <!-- VIEW CONTAINER -->
    <div id="view-container">
        
        <!-- 1. LANDING / AUTH -->
        <section id="landing-view">
            <div class="hero-card">
                <div class="brand-title">NEXA</div>
                <p style="color:var(--text-muted); margin-bottom:30px;">ARCHITECTURE OF SILENCE.</p>
                
                <div id="auth-forms">
                    <!-- Login Form -->
                    <div id="form-login">
                        <input type="email" class="input-nexa" placeholder="Email" value="demo@nexa.app">
                        <input type="password" class="input-nexa" placeholder="Пароль" value="password">
                        <button class="btn-3d" onclick="Auth.login()">Начать общение</button>
                        <p style="margin-top:15px; font-size:0.8rem; color:var(--text-muted);">
                            Нет аккаунта? <span style="color:white; cursor:pointer;" onclick="UI.toggleAuth('register')">Создать</span>
                        </p>
                    </div>
                    
                    <!-- Register Form -->
                    <div id="form-register" class="hidden">
                        <input type="email" id="reg-email" class="input-nexa" placeholder="Email">
                        <input type="password" id="reg-pass" class="input-nexa" placeholder="Придумайте пароль">
                        <!-- No Username field as requested -->
                        <button class="btn-3d" onclick="Auth.register()">Продолжить</button>
                        <p style="margin-top:15px; font-size:0.8rem; color:var(--text-muted);">
                            Уже есть аккаунт? <span style="color:white; cursor:pointer;" onclick="UI.toggleAuth('login')">Войти</span>
                        </p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 2. MAIN APPLICATION -->
        <section id="app-view" class="hidden">
            
            <!-- Server Rail -->
            <nav class="rail-servers">
                <div class="server-pill active" onclick="App.navHome()" title="Личные сообщения">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zm0 9l2.5-1.25L12 8.5l-2.5 1.25L12 11zm0 2.5l-5-2.5-5 2.5L12 22l10-8.5-5-2.5-5 2.5z"/></svg>
                </div>
                <div class="nav-sep"></div>
                <div id="server-list-rail"></div>
                <div class="server-pill" onclick="Modals.openCreateServer()" style="color:var(--status-online)">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                </div>
            </nav>

            <!-- Channel Sidebar -->
            <aside class="sidebar-channels">
                <div class="header-server" id="current-server-name">
                    <span>Загрузка...</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                </div>
                <div class="channels-list" id="channel-list"></div>
                
                <div class="user-area">
                    <div class="avatar-wrapper" onclick="Modals.openSettings()">
                        <img src="" id="my-avatar" class="avatar-img">
                        <div class="status-dot" style="background:var(--status-online)"></div>
                    </div>
                    <div style="flex:1; overflow:hidden;">
                        <div style="font-weight:600; font-size:0.9rem; white-space:nowrap;" id="my-username">User</div>
                        <div style="font-size:0.75rem; color:var(--text-muted);">#<span id="my-discriminator">0000</span></div>
                    </div>
                    <div style="display:flex; gap:8px;">
                         <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="cursor:pointer; color:var(--text-muted)"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
                    </div>
                </div>
            </aside>

            <!-- Main Chat -->
            <main class="chat-main">
                <header class="top-bar">
                    <span class="hashtag">#</span>
                    <span class="chat-title" id="chat-title">general</span>
                    <span class="chat-desc" id="chat-desc">Описание канала</span>
                </header>
                
                <div class="messages-container" id="message-feed"></div>

                <div class="input-area">
                    <div class="input-wrapper">
                        <div style="margin-right:12px; font-size:1.5rem; cursor:pointer; color:var(--text-muted);">+</div>
                        <input type="text" class="chat-input" id="msg-input" placeholder="Написать сообщение..." autocomplete="off">
                    </div>
                </div>
            </main>

            <!-- Members -->
            <aside class="members-sidebar">
                <div class="role-title">В сети — <span id="online-count">0</span></div>
                <div id="members-list"></div>
            </aside>
        </section>
    </div>

    <!-- MODALS -->
    <div class="modal-overlay" id="modal-create-server">
        <div class="modal-box">
            <h2 style="margin-bottom:10px;">Создать сервер</h2>
            <p style="color:var(--text-muted); margin-bottom:20px;">Ваш сервер будет местом общения.</p>
            <input type="text" id="new-server-name" class="input-nexa" placeholder="Название сервера">
            <div style="display:flex; justify-content:flex-end; gap:10px;">
                <button class="btn-3d" style="width:auto; background:var(--bg-surface); color:white; box-shadow:none;" onclick="Modals.closeAll()">Отмена</button>
                <button class="btn-3d" style="width:auto;" onclick="App.createServer()">Создать</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-settings">
        <div class="modal-box">
            <h2 style="margin-bottom:20px;">Мой Профиль</h2>
            <div style="text-align:center; margin-bottom:20px;">
                <img src="" id="settings-avatar" class="avatar-img" style="width:80px; height:80px;">
            </div>
            <label style="font-size:0.7rem; font-weight:700; text-transform:uppercase; color:var(--text-muted);">Отображаемое имя</label>
            <input type="text" id="settings-username" class="input-nexa">
            <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
                <button class="btn-3d" style="width:auto; background:var(--bg-surface); color:white; box-shadow:none;" onclick="Modals.closeAll()">Готово</button>
                <button class="btn-3d" style="width:auto;" onclick="App.saveProfile()">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * NEXA CORE ENGINE v3.0
         * Full Client-Side Simulation
         */

        // --- STATE MANAGEMENT ---
        const Store = {
            currentUser: null,
            servers: [
                {
                    id: 'srv_nexa', name: 'Nexa Official', icon: null,
                    channels: [
                        { id: 'ch_1', name: 'announcements', type: 'text', desc: 'Важные новости платформы' },
                        { id: 'ch_2', name: 'general', type: 'text', desc: 'Общение на любые темы' },
                        { id: 'ch_3', name: 'support', type: 'text', desc: 'Техническая поддержка' }
                    ],
                    members: ['u_me', 'u_alice', 'u_bob'],
                    messages: {
                        'ch_1': [{id:'m1', authorId:'sys', content:'Добро пожаловать в Nexa v3.0.', ts:'Сегодня в 10:00'}],
                        'ch_2': [{id:'m2', authorId:'u_alice', content:'Интерфейс выглядит просто потрясающе!', ts:'Сегодня в 10:05'}]
                    }
                }
            ],
            users: {
                'u_me': { id: 'u_me', username: 'User', disc: '8821', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Felix', status: 'online' },
                'u_alice': { id: 'u_alice', username: 'Alice', disc: '1024', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka', status: 'dnd' },
                'u_bob': { id: 'u_bob', username: 'Bob', disc: '4400', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Bob', status: 'idle' },
                'sys': { id: 'sys', username: 'System', disc: '0000', avatar: 'https://api.dicebear.com/7.x/bottts/svg?seed=Nexa', status: 'online' }
            },
            activeServerId: 'srv_nexa',
            activeChannelId: 'ch_2'
        };

        // --- UTILS ---
        const Utils = {
            uuid: () => Math.random().toString(36).substr(2, 9),
            time: () => `Сегодня в ${new Date().getHours()}:${String(new Date().getMinutes()).padStart(2,'0')}`,
            el: (sel) => document.querySelector(sel),
            els: (sel) => document.querySelectorAll(sel)
        };

        // --- ROUTER ---
        const Router = {
            go: (view) => {
                Utils.el('#landing-view').classList.add('hidden');
                Utils.el('#app-view').classList.add('hidden');
                
                if(view === 'app') {
                    Utils.el('#app-view').classList.remove('hidden');
                    App.init();
                } else {
                    Utils.el('#landing-view').classList.remove('hidden');
                }
            }
        };

        // --- AUTHENTICATION ---
        const Auth = {
            login: () => {
                // Simulate API Delay
                const btn = Utils.el('#form-login button');
                btn.innerText = 'Вход...';
                setTimeout(() => {
                    Store.currentUser = Store.users['u_me'];
                    Router.go('app');
                }, 600);
            },
            register: () => {
                const email = Utils.el('#reg-email').value;
                if(!email) return alert('Введите Email');
                
                const newId = 'u_' + Utils.uuid();
                Store.currentUser = {
                    id: newId,
                    username: 'User_' + Math.floor(Math.random()*1000), // Auto-generated
                    disc: String(Math.floor(Math.random()*9000)+1000),
                    avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${Utils.uuid()}`,
                    status: 'online'
                };
                Store.users[newId] = Store.currentUser;
                
                // Add user to default server
                Store.servers[0].members.push(newId);
                
                Router.go('app');
            }
        };

        // --- APP LOGIC ---
        const App = {
            init: () => {
                if(!Store.currentUser) return;
                
                // Update User UI
                Utils.el('#my-username').innerText = Store.currentUser.username;
                Utils.el('#my-discriminator').innerText = Store.currentUser.discriminator;
                Utils.el('#my-avatar').src = Store.currentUser.avatar;

                App.renderServers();
                App.loadServer(Store.activeServerId);
                
                // Input Listener
                Utils.el('#msg-input').addEventListener('keypress', (e) => {
                    if(e.key === 'Enter' && e.target.value.trim()) {
                        App.sendMessage(e.target.value);
                        e.target.value = '';
                    }
                });
            },

            renderServers: () => {
                const container = Utils.el('#server-list-rail');
                container.innerHTML = '';
                Store.servers.forEach(srv => {
                    const div = document.createElement('div');
                    div.className = `server-pill ${Store.activeServerId === srv.id ? 'active' : ''}`;
                    div.innerText = srv.name.substring(0,2).toUpperCase();
                    div.onclick = () => App.loadServer(srv.id);
                    container.appendChild(div);
                });
            },

            loadServer: (id) => {
                Store.activeServerId = id;
                const srv = Store.servers.find(s => s.id === id);
                
                Utils.el('#current-server-name span').innerText = srv.name;
                
                // Render Channels
                const chList = Utils.el('#channel-list');
                chList.innerHTML = `<div class="cat-name">▼ Текстовые каналы</div>`;
                
                srv.channels.filter(c => c.type === 'text').forEach(ch => {
                    const row = document.createElement('div');
                    row.className = `channel-item ${Store.activeChannelId === ch.id ? 'active' : ''}`;
                    row.innerHTML = `<span class="ch-icon">#</span> ${ch.name}`;
                    row.onclick = () => App.loadChannel(ch.id);
                    chList.appendChild(row);
                });

                // Load first channel if needed
                if(!srv.channels.find(c => c.id === Store.activeChannelId)) {
                    App.loadChannel(srv.channels[0].id);
                } else {
                    App.loadChannel(Store.activeChannelId);
                }
                
                App.renderServers();
                App.renderMembers();
            },

            loadChannel: (id) => {
                Store.activeChannelId = id;
                const srv = Store.servers.find(s => s.id === Store.activeServerId);
                const ch = srv.channels.find(c => c.id === id);
                
                Utils.el('#chat-title').innerText = ch.name;
                Utils.el('#chat-desc').innerText = ch.desc || '';
                
                // Re-render sidebar for active state
                App.loadServer(Store.activeServerId); 

                // Render Messages
                const feed = Utils.el('#message-feed');
                feed.innerHTML = '';
                
                const msgs = srv.messages[id] || [];
                msgs.forEach(m => App.appendMessage(m));
                
                feed.scrollTop = feed.scrollHeight;
            },

            appendMessage: (msg) => {
                const feed = Utils.el('#message-feed');
                const author = Store.users[msg.authorId] || { username: 'Unknown', avatar: '' };
                
                const div = document.createElement('div');
                div.className = 'message-row fade-in';
                div.innerHTML = `
                    <img src="${author.avatar}" class="msg-avatar">
                    <div class="msg-body">
                        <div class="msg-header">
                            <span class="msg-author">${author.username}</span>
                            <span class="msg-date">${msg.ts}</span>
                        </div>
                        <div class="msg-text">${msg.content}</div>
                    </div>
                `;
                feed.appendChild(div);
                feed.scrollTop = feed.scrollHeight;
            },

            sendMessage: (text) => {
                const srv = Store.servers.find(s => s.id === Store.activeServerId);
                if(!srv.messages[Store.activeChannelId]) srv.messages[Store.activeChannelId] = [];
                
                const msgObj = {
                    id: Utils.uuid(),
                    authorId: Store.currentUser.id,
                    content: text,
                    ts: Utils.time()
                };
                
                srv.messages[Store.activeChannelId].push(msgObj);
                App.appendMessage(msgObj);
            },

            createServer: () => {
                const name = Utils.el('#new-server-name').value || 'Новый Сервер';
                const newSrv = {
                    id: Utils.uuid(),
                    name: name,
                    channels: [{id: Utils.uuid(), name:'general', type:'text', desc:''}],
                    members: [Store.currentUser.id],
                    messages: {}
                };
                Store.servers.push(newSrv);
                Modals.closeAll();
                App.loadServer(newSrv.id);
            },

            saveProfile: () => {
                const newName = Utils.el('#settings-username').value;
                if(newName) {
                    Store.currentUser.username = newName;
                    Store.users[Store.currentUser.id].username = newName;
                    Utils.el('#my-username').innerText = newName;
                    Modals.closeAll();
                    // Refresh messages to show new name
                    App.loadChannel(Store.activeChannelId);
                }
            },

            renderMembers: () => {
                const list = Utils.el('#members-list');
                list.innerHTML = '';
                const srv = Store.servers.find(s => s.id === Store.activeServerId);
                
                let onlineCount = 0;

                srv.members.forEach(uid => {
                    const u = Store.users[uid];
                    if(!u) return;
                    if(u.status !== 'offline') onlineCount++;

                    const div = document.createElement('div');
                    div.className = 'member-item';
                    div.innerHTML = `
                        <div style="position:relative;">
                            <img src="${u.avatar}" class="avatar-img" style="width:32px;height:32px;">
                            <div class="status-dot" style="background:var(--status-${u.status}); width:10px; height:10px; border-width:2px;"></div>
                        </div>
                        <div class="member-info">
                            <div class="member-name">${u.username}</div>
                            <div class="member-status">${u.status === 'online' ? 'В сети' : u.status}</div>
                        </div>
                    `;
                    list.appendChild(div);
                });
                
                Utils.el('#online-count').innerText = onlineCount;
            }
        };

        // --- UI HELPERS ---
        const Modals = {
            openCreateServer: () => Utils.el('#modal-create-server').style.display = 'flex',
            openSettings: () => {
                Utils.el('#settings-username').value = Store.currentUser.username;
                Utils.el('#settings-avatar').src = Store.currentUser.avatar;
                Utils.el('#modal-settings').style.display = 'flex';
            },
            closeAll: () => Utils.els('.modal-overlay').forEach(el => el.style.display = 'none')
        };

        const UI = {
            toggleAuth: (type) => {
                if(type === 'register') {
                    Utils.el('#form-login').classList.add('hidden');
                    Utils.el('#form-register').classList.remove('hidden');
                } else {
                    Utils.el('#form-login').classList.remove('hidden');
                    Utils.el('#form-register').classList.add('hidden');
                }
            }
        };

        // Close modals on outside click
        window.onclick = (e) => {
            if(e.target.classList.contains('modal-overlay')) Modals.closeAll();
        };

    </script>
</body>
</html>
