    <style>
        /* ----- СБРОС И БАЗА ----- */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0c0c0c;
            --bg-secondary: #141414;
            --bg-glass: rgba(255,255,255,0.04);
            --border-glass: rgba(255,255,255,0.08);
            --text-primary: #f2f2f2;
            --text-secondary: #a0a0a0;
            --accent: #7a7a7a;
            --accent-hover: #9a9a9a;
            --online: #3ba55d;
            --idle: #faa81a;
            --dnd: #ed4245;
            --offline: #747f8d;
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.7);
            --radius: 12px;
            --radius-sm: 8px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        html, body { height: 100%; font-family: var(--font); background: var(--bg-primary); color: var(--text-primary); overflow: hidden; }
        a { color: inherit; text-decoration: none; }
        button { font-family: inherit; cursor: pointer; border: none; outline: none; background: none; color: inherit; }
        input { font-family: inherit; outline: none; border: none; background: none; color: inherit; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
        /* ----- СТАРТОВЫЙ ЭКРАН (Splash) ----- */
        #splash {
            position: fixed; inset: 0; z-index: 1000;
            background: var(--bg-primary);
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        #splash-bg {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 30% 40%, #1e1e1e, #0a0a0a);
            filter: blur(40px) brightness(0.5);
            transform: scale(1.1);
        }
        #splash-content {
            position: relative; z-index: 2;
            display: flex; flex-direction: column; align-items: center; gap: 32px;
            text-align: center;
            animation: fadeUp 1s ease forwards;
        }
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        .splash-logo { font-size: 64px; font-weight: 800; letter-spacing: -0.03em; color: white; text-shadow: 0 0 40px rgba(255,255,255,0.1); }
        .splash-logo span { color: var(--accent); }
        .splash-desc { font-size: 18px; color: var(--text-secondary); max-width: 400px; line-height: 1.6; }
        .splash-actions { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
        .btn-primary, .btn-secondary {
            padding: 12px 32px; border-radius: 40px; font-size: 16px; font-weight: 600;
            transition: all 0.25s ease; letter-spacing: 0.01em;
        }
        .btn-primary { background: white; color: black; box-shadow: 0 4px 20px rgba(255,255,255,0.15); }
        .btn-primary:hover { transform: scale(1.04); box-shadow: 0 8px 30px rgba(255,255,255,0.25); }
        .btn-secondary { border: 1px solid var(--border-glass); background: var(--bg-glass); backdrop-filter: blur(8px); }
        .btn-secondary:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
        /* ----- ОСНОВНОЙ ИНТЕРФЕЙС (скрыт до старта) ----- */
        #app { display: none; height: 100vh; }
        #app.active { display: flex; }
        /* Левый сайдбар (каналы) */
        .sidebar-left { width: 280px; min-width: 280px; background: var(--bg-secondary); display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.04); }
        .sidebar-header { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: space-between; }
        .sidebar-header h2 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
        .sidebar-header .icon { font-size: 20px; opacity: 0.5; transition: 0.2s; }
        .sidebar-header .icon:hover { opacity: 1; }
        .channel-list { flex: 1; overflow-y: auto; padding: 8px 0; }
        .channel-item { padding: 8px 20px; display: flex; align-items: center; gap: 10px; color: var(--text-secondary); font-size: 15px; border-radius: 0; transition: 0.15s; cursor: pointer; }
        .channel-item:hover { color: var(--text-primary); background: rgba(255,255,255,0.04); }
        .channel-item.active { color: white; background: rgba(255,255,255,0.06); }
